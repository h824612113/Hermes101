<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #222; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.phone {
  width: 380px; height: 680px; background: #0f1f2e; border-radius: 36px; overflow: hidden;
  border: 3px solid #333; display: flex; flex-direction: column; position: relative;
}
.statusbar { height: 44px; background: #1a2942; display: flex; align-items: center; justify-content: center; }
.statusbar .time { color: #fff; font-size: 14px; font-weight: 600; }
.header-bar { background: #1a2942; padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header-info .name { color: #fff; font-size: 16px; font-weight: 600; }
.header-info .status { color: #3b9ad9; font-size: 12px; }
.chat { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.msg.bot { background: #182533; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: #2b5278; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
</style></head>
<body>
<div class="phone">
  <div class="statusbar"><div class="time">10:23</div></div>
  <div class="header-bar">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <div class="name">Hermes Assistant</div>
      <div class="status">online</div>
    </div>
  </div>
  <div class="chat">
    <div class="msg user">你好！你是谁？</div>
    <div class="msg bot">你好！我是你的 AI 助手，由 Hermes Agent 驱动。我住在你自己的服务器上，随时为你服务。</div>
    <div class="msg user">你可以做什么？</div>
    <div class="msg bot">目前我可以和你聊天、回答问题、帮你写代码和分析问题。随着你给我配置更多技能，我能做的事情会越来越多 😊</div>
    <div class="msg user">帮我写一首关于夜空的诗</div>
    <div class="msg bot">星辰如墨洒苍穹，<br>银河漫漫映长空。<br>月色温柔抚大地，<br>夜风轻吟万物中。✨</div>
  </div>
</div>
</body></html>
