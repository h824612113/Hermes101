<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.card {
  background: #1e293b; border-radius: 16px; padding: 32px; width: 520px;
  border: 1px solid rgba(255,255,255,0.08);
}
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.header .logo { width: 32px; height: 32px; background: #d50c2d; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px; }
.header .name { color: #fff; font-size: 18px; font-weight: 700; }
.header .plan { color: #94a3b8; font-size: 14px; margin-left: auto; }
h3 { color: #fff; font-size: 16px; margin-bottom: 20px; }
.row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.row:last-child { border-bottom: none; }
.row .label { color: #94a3b8; font-size: 14px; }
.row .value { color: #fff; font-size: 14px; font-weight: 600; }
.price-row { margin-top: 20px; padding: 16px; background: rgba(16,185,129,0.1); border-radius: 10px; border: 1px solid rgba(16,185,129,0.2); display: flex; justify-content: space-between; align-items: center; }
.price-row .price { color: #10b981; font-size: 28px; font-weight: 800; }
.price-row .unit { color: #94a3b8; font-size: 14px; }
.rec { display: inline-block; background: rgba(59,130,246,0.15); color: #93c5fd; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
</style></head>
<body>
<div class="card">
  <div class="rec">⭐ Recommended for Hermes Agent</div>
  <div class="header">
    <div class="logo">H</div>
    <div class="name">Hetzner Cloud — CX22</div>
  </div>
  <h3>Server Specifications</h3>
  <div class="row"><span class="label">CPU</span><span class="value">2 vCPU (AMD)</span></div>
  <div class="row"><span class="label">Memory</span><span class="value">4 GB DDR4</span></div>
  <div class="row"><span class="label">Storage</span><span class="value">40 GB NVMe SSD</span></div>
  <div class="row"><span class="label">Traffic</span><span class="value">20 TB included</span></div>
  <div class="row"><span class="label">Location</span><span class="value">EU / US</span></div>
  <div class="price-row">
    <div><div class="price">$4.59</div><div class="unit">per month</div></div>
    <div style="text-align:right"><div style="color:#94a3b8;font-size:13px">Alternatives:</div><div style="color:#94a3b8;font-size:13px">AWS Lightsail ~$5/mo</div><div style="color:#94a3b8;font-size:13px">Tencent Cloud ~¥30/mo</div></div>
  </div>
</div>
</body></html>
