<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; }
.og {
  width: 1200px; height: 630px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
.grid-overlay {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
}
.glow1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; filter: blur(100px); opacity: 0.25; top: -150px; right: -100px; background: #3b82f6; }
.glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); opacity: 0.2; bottom: -100px; left: -50px; background: #10b981; }
.glow3 { position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(60px); opacity: 0.15; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #8b5cf6; }
.content { position: relative; z-index: 10; text-align: center; padding: 40px; }
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 24px; border-radius: 24px;
  font-size: 15px; font-weight: 600; letter-spacing: 1px;
  margin-bottom: 24px;
  background: rgba(59,130,246,0.12); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25);
}
.title {
  font-size: 56px; font-weight: 800; line-height: 1.15; margin-bottom: 16px;
  background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 22px; font-weight: 400; color: #94a3b8; max-width: 700px; line-height: 1.5; }
.stats {
  display: flex; gap: 40px; margin-top: 36px; justify-content: center;
}
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: #fff; }
.stat-label { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.brand {
  position: absolute; bottom: 30px;
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.35);
}
</style></head>
<body>
<div class="og">
  <div class="bg"></div>
  <div class="grid-overlay"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="content">
    <div class="badge">🚀 7-Day Practical Guide</div>
    <div class="title">Build a Hermes Workflow<br>You Actually Use</div>
    <div class="subtitle">From deployment to personality and automation,<br>ship an AI assistant you can run long-term.</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">7</div><div class="stat-label">Lessons</div></div>
      <div class="stat"><div class="stat-num">29</div><div class="stat-label">Resources</div></div>
      <div class="stat"><div class="stat-num">Bilingual</div><div class="stat-label">EN + 中文</div></div>
    </div>
  </div>
  <div class="brand">🐾 Hermes 101</div>
</div>
</body></html>
